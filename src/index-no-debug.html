<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万遥客户端 - 无调试面板测试</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/common.css">
    <style>
        .monitor-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
        .monitor-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--border-radius-lg); padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .monitor-card__header { display: flex; align-items: center; gap: 12px; }
        .monitor-card__icon { width: 40px; height: 40px; background: var(--accent-gradient); border-radius: var(--border-radius-md); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .monitor-card__info { flex: 1; min-width: 0; }
        .monitor-card__name { font-size: 12px; color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .monitor-card__detail { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
        .monitor-card__usage { display: flex; align-items: baseline; gap: 4px; }
        .monitor-card__value { font-size: 32px; font-weight: 600; font-family: var(--font-mono); line-height: 1; }
        .monitor-card__unit { font-size: 14px; color: var(--text-secondary); }
        .monitor-card__bar { height: 6px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden; }
        .monitor-card__bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
        .monitor-card__bar-fill.cpu { background: linear-gradient(90deg, #60a5fa, #3b82f6); }
        .monitor-card__bar-fill.memory { background: linear-gradient(90deg, #a78bfa, #8b5cf6); }
        .monitor-card__bar-fill.gpu { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
        .chart-section { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--border-radius-lg); padding: 20px; margin-bottom: 24px; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .chart-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .chart-legend { display: flex; gap: 16px; }
        .chart-legend__item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
        .chart-legend__dot { width: 8px; height: 8px; border-radius: 50%; }
        .chart-legend__dot.cpu { background: #60a5fa; }
        .chart-legend__dot.memory { background: #a78bfa; }
        .chart-legend__dot.gpu { background: #fbbf24; }
        .chart-wrapper { height: 180px; position: relative; }
        @media (max-width: 900px) { .monitor-section { grid-template-columns: 1fr; } }
        #log { background: #0a0a1e; padding: 10px; font-family: monospace; min-height: 200px; white-space: pre-wrap; position: fixed; bottom: 0; left: 0; right: 0; height: 150px; overflow-y: auto; z-index: 9999; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="titlebar">
            <div class="titlebar__title">
                <img src="css/logo.png" class="titlebar__logo" alt="万遥">
                <span>万遥客户端</span>
            </div>
            <div class="titlebar__controls">
                <button class="titlebar__btn" onclick="log('最小化')" title="最小化">─</button>
                <button class="titlebar__btn" onclick="log('最大化')" title="最大化">□</button>
                <button class="titlebar__btn titlebar__btn--close" onclick="log('关闭')" title="关闭">✕</button>
            </div>
        </div>
        
        <div class="main-wrapper">
            <aside class="sidebar">
                <div class="sidebar__header">
                    <div class="sidebar__logo">
                        <img src="css/logo.png" class="sidebar__logo-icon" alt="万遥">
                        <span class="sidebar__logo-text">万遥</span>
                    </div>
                </div>
                
                <nav class="sidebar__nav">
                    <div class="nav-section">
                        <div class="nav-section__title">主要功能</div>
                        <div class="nav-item active" data-page="dashboard" onclick="log('导航: dashboard')">
                            <span class="nav-item__icon">📊</span>
                            <span class="nav-item__text">仪表盘</span>
                        </div>
                        <div class="nav-item" data-page="serial" onclick="log('导航: serial')">
                            <span class="nav-item__icon">🔌</span>
                            <span class="nav-item__text">串口助手</span>
                        </div>
                    </div>
                </nav>
            </aside>
            
            <main class="content">
                <div class="content__header">
                    <h1 class="content__title">仪表盘</h1>
                    <div class="content__actions">
                        <button class="btn btn--ghost" onclick="log('切换主题')">🌓 切换主题</button>
                    </div>
                </div>
                
                <div class="content__body">
                    <div class="dashboard">
                        <div class="dashboard__section">
                            <div class="dashboard__section-title">系统监控</div>
                            <div class="monitor-section">
                                <div class="monitor-card">
                                    <div class="monitor-card__header">
                                        <div class="monitor-card__icon">🖥️</div>
                                        <div class="monitor-card__info">
                                            <div class="monitor-card__name" id="hwCpuName">检测中...</div>
                                            <div class="monitor-card__detail" id="statCpuCores">-- 核心</div>
                                        </div>
                                    </div>
                                    <div class="monitor-card__usage">
                                        <span class="monitor-card__value" id="statCpuValue">--</span>
                                        <span class="monitor-card__unit">%</span>
                                    </div>
                                    <div class="monitor-card__bar">
                                        <div class="monitor-card__bar-fill cpu" id="statCpuBar" style="width: 0%"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="dashboard__section">
                            <div class="dashboard__section-title">功能模块</div>
                            <div class="cards-grid">
                                <div class="card" onclick="log('卡片: serial')">
                                    <div class="card__icon">🔌</div>
                                    <div class="card__title">串口助手</div>
                                    <div class="card__desc">串口通信调试工具</div>
                                </div>
                                <div class="card" onclick="log('卡片: network')">
                                    <div class="card__icon">🌐</div>
                                    <div class="card__title">网络助手</div>
                                    <div class="card__desc">TCP/UDP 网络调试工具</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <div id="log">日志输出:</div>

    <script src="js/common.js"></script>
    <script src="js/window-controls.js"></script>
    <script src="js/system-monitor.js"></script>
    <script>
        function log(msg) {
            var logDiv = document.getElementById('log');
            var time = new Date().toLocaleTimeString();
            logDiv.textContent += '\n[' + time + '] ' + msg;
            console.log(msg);
        }
        
        log('页面加载完成');
        log('window.__TAURI__ 存在: ' + !!window.__TAURI__);
    </script>
</body>
</html>
